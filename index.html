<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sky" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#050814" />
  <meta name="description" content="Find grahas, nakshatras, zodiac and the ISS with your iPhone camera." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Sky</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <video id="camera" playsinline webkit-playsinline muted autoplay></video>
    <canvas id="skyCanvas" aria-hidden="true"></canvas>

    <header class="top-bar">
      <div class="brand">
        <span class="logo">✦</span>
        <span>Sky</span>
      </div>
      <div class="chips">
        <div id="locChip" class="chip muted">GPS…</div>
        <div id="statusChip" class="chip muted">Starting…</div>
      </div>
    </header>

    <div class="zoom-bar" aria-label="Zoom">
      <button type="button" class="zoom-btn" data-zoom="0.5">0.5</button>
      <button type="button" class="zoom-btn active" data-zoom="1">1</button>
      <button type="button" class="zoom-btn" data-zoom="2">2</button>
      <button type="button" class="zoom-btn" data-zoom="5">5</button>
      <span id="zoomVal" class="zoom-val">1×</span>
      <input type="range" id="zoomSlider" min="0.5" max="8" step="0.1" value="1" aria-label="Zoom" />
    </div>

    <div class="crosshair" aria-hidden="true">
      <span class="ring"></span>
      <span class="dot"></span>
    </div>

    <div id="edgeLeft" class="edge-cue edge-left" aria-hidden="true">◀</div>
    <div id="edgeRight" class="edge-cue edge-right" aria-hidden="true">▶</div>
    <div id="edgeUp" class="edge-cue edge-up" aria-hidden="true">▲</div>
    <div id="edgeDown" class="edge-cue edge-down" aria-hidden="true">▼</div>

    <div id="guidePanel" class="guide-panel hidden" aria-live="polite">
      <div id="guidePrimary" class="guide-primary">—</div>
      <div id="guideSecondary" class="guide-secondary">—</div>
      <div id="guideDelta" class="guide-delta">—</div>
    </div>

    <div id="lockedBadge" class="locked-badge hidden">
      <strong id="lockedName">—</strong>
      <span id="lockedDetail"></span>
    </div>

    <div id="alignBanner" class="align-banner hidden">
      <p><strong>Align:</strong> put the real object in the crosshair, then tap Align.</p>
      <button type="button" id="btnAlignQuick" class="primary-btn">Align now</button>
    </div>

    <!-- Compact look-at pill (not a big HUD) -->
    <div id="pointingHud" class="pointing-hud">
      <div id="pointingMain" class="hud-main">—</div>
      <div id="pointingSub" class="hud-sub">—</div>
    </div>

    <!-- Google Maps–style floating controls -->
    <div class="map-controls" id="mapControls">
      <button type="button" id="btnLayers" class="fab" aria-expanded="false" aria-controls="layerPanel">
        <span class="fab-icon">☰</span>
        <span class="fab-text">Layers</span>
      </button>
      <button type="button" id="btnFind" class="fab ghost" aria-expanded="false" aria-controls="findPanel">
        <span class="fab-icon">◎</span>
        <span class="fab-text" id="findFabLabel">Find</span>
      </button>
      <button type="button" id="btnCalibrate" class="fab ghost">
        <span class="fab-icon">⌖</span>
        <span class="fab-text">Align</span>
      </button>
    </div>

    <!-- Layer panel (Maps-style card) -->
    <div id="layerPanel" class="map-panel hidden" role="dialog" aria-label="Map layers">
      <div class="map-panel-head">
        <strong>Map type</strong>
        <button type="button" class="icon-x" id="btnCloseLayers" aria-label="Close">✕</button>
      </div>
      <div class="layer-cards">
        <button type="button" class="layer-card active" data-layer="graha">
          <span class="lc-icon">☉</span>
          <span class="lc-name">Graha</span>
          <span class="lc-desc">Planets · Rāhu · Ketu</span>
        </button>
        <button type="button" class="layer-card" data-layer="nakshatra">
          <span class="lc-icon">✦</span>
          <span class="lc-name">Nakṣatra</span>
          <span class="lc-desc">27 lunar mansions</span>
        </button>
        <button type="button" class="layer-card" data-layer="rasi">
          <span class="lc-icon">♈</span>
          <span class="lc-name">Zodiac</span>
          <span class="lc-desc">12 rāśis</span>
        </button>
        <button type="button" class="layer-card" data-layer="iss">
          <span class="lc-icon">🛰</span>
          <span class="lc-name">ISS</span>
          <span class="lc-desc">Space station</span>
        </button>
      </div>
      <label class="check-tool panel-check">
        <input type="checkbox" id="onlyAbove" checked />
        Only above horizon in list
      </label>
    </div>

    <!-- Find panel: object list for active layer (slides up, not full screen) -->
    <div id="findPanel" class="find-panel hidden">
      <div class="find-grab" id="findGrab"></div>
      <div class="find-head">
        <div>
          <h1 id="listTitle">Graha</h1>
          <p id="layerHint" class="layer-hint">Tap to guide</p>
        </div>
        <div class="head-actions">
          <button type="button" id="btnClearTarget" class="text-btn hidden">Clear</button>
          <button type="button" id="btnCloseFind" class="icon-x" aria-label="Close">✕</button>
        </div>
      </div>
      <p id="listMeta" class="list-meta">—</p>
      <div id="objectList" class="object-grid" role="listbox" aria-label="Objects"></div>
    </div>

    <!-- Mini bar when guiding (sheet faded away) -->
    <div id="guideDock" class="guide-dock hidden">
      <button type="button" id="btnDockExpand" class="dock-main">
        <span id="dockTarget">—</span>
        <span id="dockHint" class="dock-hint">Guiding</span>
      </button>
      <button type="button" id="btnDockClear" class="dock-clear" aria-label="Clear">✕</button>
      <button type="button" id="btnDockLayers" class="dock-layers" aria-label="Layers">☰</button>
    </div>

    <!-- Settings tucked away -->
    <details class="settings-float" id="settingsFloat">
      <summary>⋯</summary>
      <div class="settings-body">
        <label class="calib">
          Compass
          <input type="range" id="headingOffset" min="-60" max="60" value="0" />
          <span id="headingOffsetVal">0°</span>
        </label>
        <label class="calib">
          Elev
          <input type="range" id="pitchOffset" min="-40" max="40" value="0" />
          <span id="pitchOffsetVal">0°</span>
        </label>
        <button type="button" id="btnStart" class="primary-btn">Restart sensors</button>
        <p id="debugLine" class="debug-line">—</p>
      </div>
    </details>

    <div id="gate" class="gate">
      <div class="gate-card">
        <div class="gate-icon">☾</div>
        <h2>Sky</h2>
        <p>
          Camera overlays for grahas, nakṣatras, zodiac &amp; ISS.
          Layers work like Maps — pick a layer, then a target.
        </p>
        <button type="button" id="btnGateStart" class="primary-btn wide">Allow &amp; start</button>
        <p id="gateError" class="error" hidden></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
  <script src="astro-extras.js?v=6"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
